###############################################################################
# GROW OS HA v4.0 - DASHBOARD
# Presentation only. The Registry supplies assignments, the Arbiter supplies
# decisions, and the cards below show mirrors or deliberate manual controls.
###############################################################################

title: Grow OS HA

views:
  # The daily cockpit: a calm overview of the current grow situation.
  - title: Uebersicht
    path: overview
    icon: mdi:leaf
    type: sections
    sections:
      - type: grid
        cards:
          - type: markdown
            content: |
              # Grow Box
              **{{ states('sensor.grow_policy_registry_v4') }}** ist aktiv. Der Arbiter ist **{{ states('sensor.grow_arbiter_v4') }}** und steuert die Anlage nach den hinterlegten Registern.
      - type: grid
        cards:
          - type: markdown
            content: |
              ## Klima und Substrat
              Die wichtigsten Ist-Werte auf einen Blick. Grenzwerte und Entscheidungen findest du unter *Phasen* und *Arbiter*.
      - type: grid
        columns: 2
        cards:
          - type: gauge
            entity: sensor.grow_v4_temperature_mirror
            name: Temperatur
            min: 10
            max: 40
            needle: true
          - type: gauge
            entity: sensor.grow_v4_humidity_mirror
            name: Luftfeuchtigkeit
            min: 0
            max: 100
            needle: true
          - type: gauge
            entity: sensor.grow_v4_soil_1_mirror
            name: Boden Pflanze 1
            min: 0
            max: 100
            needle: true
          - type: gauge
            entity: sensor.grow_v4_soil_2_mirror
            name: Boden Pflanze 2
            min: 0
            max: 100
            needle: true
      - type: grid
        cards:
          - type: markdown
            content: |
              ## Plant Buddy
              Eine beratende Vorschau fuer beide Pflanzen. Der Buddy bewertet Licht, Temperatur, Luftfeuchte und die jeweilige Bodenfeuchte - er schaltet selbst nichts.
      - type: grid
        columns: 3
        cards:
          - type: tile
            entity: sensor.grow_plant_buddy
            name: Gesamtstress
            icon: mdi:account-heart
          - type: tile
            entity: sensor.grow_plant_1_stress
            name: Pflanze 1
            icon: mdi:leaf
          - type: tile
            entity: sensor.grow_plant_2_stress
            name: Pflanze 2
            icon: mdi:leaf
      - type: grid
        cards:
          - type: markdown
            content: |
              **Status:** {{ state_attr('sensor.grow_plant_buddy', 'status') | default('wird berechnet', true) }}

              **Ausblick:** {{ state_attr('sensor.grow_plant_buddy', 'forecast') | default('wird berechnet', true) }}

              **Profil Pflanze 1:** {{ state_attr('sensor.grow_plant_buddy', 'plant_1_profile') | default('wird geladen', true) }}

              **Profil Pflanze 2:** {{ state_attr('sensor.grow_plant_buddy', 'plant_2_profile') | default('wird geladen', true) }}

              **Pflanze 1:** {{ state_attr('sensor.grow_plant_buddy', 'plant_1_recommendation') | default('wird berechnet', true) }}

              **Pflanze 2:** {{ state_attr('sensor.grow_plant_buddy', 'plant_2_recommendation') | default('wird berechnet', true) }}

              **5-Minuten-Klimaausblick:** {{ state_attr('sensor.grow_plant_buddy_climate_review', 'recommendation') | default('erste Bewertung folgt', true) }}

              **30-Minuten-Bodencheck P1:** {{ state_attr('sensor.grow_plant_1_soil_review', 'recommendation') | default('erste Bewertung folgt', true) }}

              **30-Minuten-Bodencheck P2:** {{ state_attr('sensor.grow_plant_2_soil_review', 'recommendation') | default('erste Bewertung folgt', true) }}
      - type: grid
        columns: 2
        cards:
          - type: entities
            title: Stressprofil Pflanze 1
            entities:
              - sensor.grow_plant_1_stress
              - entity: sensor.grow_plant_1_stress
                type: attribute
                attribute: temperature_stress
                name: Temperaturstress
              - entity: sensor.grow_plant_1_stress
                type: attribute
                attribute: humidity_stress
                name: Luftfeuchtestress
              - entity: sensor.grow_plant_1_stress
                type: attribute
                attribute: soil_stress
                name: Bodenstress
              - entity: sensor.grow_plant_1_stress
                type: attribute
                attribute: light_stress
                name: Lichtstress
          - type: entities
            title: Stressprofil Pflanze 2
            entities:
              - sensor.grow_plant_2_stress
              - entity: sensor.grow_plant_2_stress
                type: attribute
                attribute: temperature_stress
                name: Temperaturstress
              - entity: sensor.grow_plant_2_stress
                type: attribute
                attribute: humidity_stress
                name: Luftfeuchtestress
              - entity: sensor.grow_plant_2_stress
                type: attribute
                attribute: soil_stress
                name: Bodenstress
              - entity: sensor.grow_plant_2_stress
                type: attribute
                attribute: light_stress
                name: Lichtstress
      - type: grid
        cards:
          - type: markdown
            content: |
              ## Betrieb jetzt
              Wasserstand, Verbrauch und die vom Arbiter ausgegebenen Schaltbefehle.
      - type: grid
        columns: 2
        cards:
          - type: tile
            entity: sensor.grow_v4_tank_mirror
            name: Wassertank
            icon: mdi:water
          - type: tile
            entity: sensor.grow_v4_total_power_mirror
            name: Schrankleistung
            icon: mdi:flash
          - type: tile
            entity: sensor.grow_v4_energy_cost_mirror
            name: Kosten bisher
            icon: mdi:currency-eur
          - type: tile
            entity: sensor.grow_v4_heat_power_mirror
            name: Heizleistung
            icon: mdi:radiator
          - type: tile
            entity: sensor.grow_v4_light_command_mirror
            name: Lichtbefehl
            icon: mdi:lightbulb
      - type: grid
        cards:
          - type: markdown
            content: |
              ## Manuelle Eingriffe
              Diese Schalter sind bewusst direkt erreichbar. Die normale Regelung kommt weiterhin vom Arbiter; Sperren und Zuordnungen liegen unter *Geraete*.
      - type: grid
        columns: 2
        cards:
          - type: tile
            entity: switch.waschkuche_ug_waschkuche_grow_beleuchtung_shelly_plug_s
            name: Beleuchtung
            icon: mdi:lightbulb
            tap_action: { action: toggle }
          - type: tile
            entity: switch.waschkuche_ug_waschkuche_grow_geizung_shelly_1
            name: Heizung
            icon: mdi:radiator
            tap_action: { action: toggle }
          - type: tile
            entity: switch.waschkuche_ug_waschkueche_ug_grow_belueftung_shelly_plug_s
            name: Belueftung
            icon: mdi:fan
            tap_action: { action: toggle }
          - type: tile
            entity: switch.grow_pumpe_pflanze_1
            name: Pumpe 1
            icon: mdi:water-pump
            tap_action: { action: toggle }
          - type: tile
            entity: switch.grow_pumpe_pflanze_2
            name: Pumpe 2
            icon: mdi:water-pump
            tap_action: { action: toggle }
      - type: grid
        cards:
          - type: history-graph
            title: Klima der letzten 24 Stunden
            hours_to_show: 24
            entities:
              - sensor.grow_v4_temperature_mirror
              - sensor.grow_v4_humidity_mirror

  # Consumption and cost page, deliberately modelled after an energy overview.
  - title: Energie
    path: energy
    icon: mdi:lightning-bolt
    type: sections
    sections:
      - type: grid
        cards:
          - type: energy-date-selection
      - type: grid
        cards:
          - type: markdown
            content: |
              # Energie und Kosten
              Gesamt, Licht und Belueftung kommen direkt aus den Shelly-Energiezaehlern. Heizung bleibt als Rest aus Gesamt minus Licht minus Belueftung berechnet.

              Die Datumsauswahl oben steuert auf dieser Seite die Verbrauchs- und Zeitraumkarten. Nur die Momentanwerte bleiben bewusst live.
      - type: grid
        columns: 2
        cards:
          - type: gauge
            entity: sensor.grow_v4_total_power_mirror
            name: Schrankleistung jetzt
            min: 0
            max: 1000
            needle: true
          - type: gauge
            entity: sensor.grow_v4_total_energy_mirror
            name: Schrankenergie gesamt
            min: 0
            max: 30
            needle: true
      - type: grid
        cards:
          - type: markdown
            content: |
              ## Bilanz fuer den gewaehlten Zeitraum
              Diese Kennzahlen folgen direkt der nativen Energy-Datumsauswahl oben und bilden den oberen Schnellueberblick der Energie-Seite.
      - type: grid
        columns: 3
        cards:
          - type: statistic
            entity: sensor.waschkuche_ug_grow_shelly_1_pm_energie
            name: Gesamtverbrauch Zeitraum
            stat_type: change
            period: energy_date_selection
          - type: statistic
            entity: sensor.grow_v4_energy_cost_mirror
            name: Kosten Zeitraum
            stat_type: change
            period: energy_date_selection
          - type: statistic
            entity: sensor.netzbezug_energie_kwh
            name: Netzbezug Zeitraum
            stat_type: change
            period: energy_date_selection
      - type: grid
        cards:
          - type: markdown
            content: |
              ## Verbraucher im Zeitraum
              Aufteilung des gewaehlten Zeitraums nach Heizung, Licht und Belueftung.
      - type: grid
        columns: 2
        cards:
          - type: statistic
            entity: sensor.grow_v4_heat_energy_mirror
            name: Heizung Zeitraum
            stat_type: change
            period: energy_date_selection
          - type: statistic
            entity: sensor.waschkuche_ug_waschkuche_grow_beleuchtung_shelly_plug_s_energie
            name: Licht Zeitraum
            stat_type: change
            period: energy_date_selection
          - type: statistic
            entity: sensor.waschkuche_ug_waschkueche_ug_grow_belueftung_shelly_plug_s_energie
            name: Belueftung Zeitraum
            stat_type: change
            period: energy_date_selection
      - type: grid
        cards:
          - type: markdown
            content: |
              ## Netz und Tarif
              Energieaustausch mit dem Hausnetz und die zugrunde liegenden Zaehler.
      - type: grid
        columns: 2
        cards:
          - type: statistic
            entity: sensor.netzeinspeisung_energie_kwh
            name: Einspeisung Zeitraum
            stat_type: change
            period: energy_date_selection
          - type: entities
            title: Tarif und Zaehler
            entities:
              - input_number.grow_energy_price_kwh
              - sensor.waschkuche_ug_grow_shelly_1_pm_energie
              - sensor.grow_v4_heat_energy_mirror
              - sensor.waschkuche_ug_waschkuche_grow_beleuchtung_shelly_plug_s_energie
              - sensor.waschkuche_ug_waschkueche_ug_grow_belueftung_shelly_plug_s_energie
              - sensor.netzbezug_energie_kwh
              - sensor.netzeinspeisung_energie_kwh
      - type: grid
        cards:
          - type: markdown
            content: |
              ## Momentanwerte
              Diese Karten zeigen absichtlich immer den aktuellen Live-Zustand des Schranks und folgen nicht der Datumsauswahl.
      - type: grid
        columns: 2
        cards:
          - type: tile
            entity: sensor.grow_v4_total_power_mirror
            name: Gesamtleistung live
            icon: mdi:flash
          - type: tile
            entity: sensor.grow_v4_heat_power_mirror
            name: Heizung live
            icon: mdi:radiator
          - type: tile
            entity: sensor.grow_v4_light_power_mirror
            name: Licht live
            icon: mdi:lightbulb
          - type: tile
            entity: sensor.grow_v4_vent_power_mirror
            name: Belueftung live
            icon: mdi:fan
      - type: grid
        columns: 2
        cards:
          - type: tile
            entity: sensor.waschkuche_ug_grow_shelly_1_pm_energie
            name: Gesamtzaehler live
            icon: mdi:counter
          - type: tile
            entity: sensor.grow_v4_energy_cost_mirror
            name: Kosten gesamt live
            icon: mdi:currency-eur

  # Explains the single-source-of-truth control model without exposing policy edits.
  - title: Arbiter
    path: arbiter
    icon: mdi:scale-balance
    type: sections
    sections:
      - type: grid
        cards:
          - type: markdown
            content: |
              # Die Entscheidungskette
              **Register** geben feste Regeln vor -> **Arbiter** bewertet Ist-Werte -> **Aktoren** fuehren den Befehl aus. Nur der Arbiter entscheidet.
      - type: grid
        columns: 3
        cards:
          - type: tile
            entity: sensor.grow_policy_registry_v4
            name: Aktives Regelregister
            icon: mdi:book-cog
          - type: tile
            entity: sensor.grow_arbiter_v4
            name: Arbiter-Status
            icon: mdi:scale-balance
          - type: tile
            entity: sensor.grow_v4_vent_command_mirror
            name: Abluftbefehl
            icon: mdi:fan
      - type: grid
        cards:
          - type: markdown
            content: |
              ## Systemueberblick
              Der Arbiter bewertet nur Ist-Werte und Register. Die Karten unten zeigen getrennt, was gerade gemessen wird und was daraus als Befehl entsteht.
      - type: grid
        columns: 2
        cards:
          - type: gauge
            entity: sensor.grow_v4_temperature_mirror
            name: Temperatur
            min: 10
            max: 40
            needle: true
          - type: gauge
            entity: sensor.grow_v4_humidity_mirror
            name: Luftfeuchtigkeit
            min: 0
            max: 100
            needle: true
          - type: gauge
            entity: sensor.grow_v4_soil_1_mirror
            name: Boden Pflanze 1
            min: 0
            max: 100
            needle: true
          - type: gauge
            entity: sensor.grow_v4_soil_2_mirror
            name: Boden Pflanze 2
            min: 0
            max: 100
            needle: true
      - type: grid
        cards:
          - type: markdown
            content: |
              ## Aktorbefehle
              Diese Schaltbefehle kommen direkt aus dem Arbiter und werden von der Aktorebene nur gespiegelt.
      - type: grid
        columns: 3
        cards:
          - type: tile
            entity: sensor.grow_v4_light_command_mirror
            name: Licht
            icon: mdi:lightbulb
          - type: tile
            entity: sensor.grow_v4_heat_command_mirror
            name: Heizung
            icon: mdi:radiator
          - type: tile
            entity: sensor.grow_v4_vent_command_mirror
            name: Abluft
            icon: mdi:fan
          - type: tile
            entity: sensor.grow_v4_pump_1_command_mirror
            name: Pumpe 1
            icon: mdi:water-pump
          - type: tile
            entity: sensor.grow_v4_pump_2_command_mirror
            name: Pumpe 2
            icon: mdi:water-pump
          - type: tile
            entity: sensor.grow_v4_tank_mirror
            name: Wassertank
            icon: mdi:water
      - type: grid
        cards:
          - type: markdown
            content: |
              ## Abluft-Wirkungspruefung
              Hier siehst du, ob die Abluft wegen ausbleibender Verbesserung gesperrt wurde. Nach 5 Minuten wird geprueft, ob sich der relevante Wert verbessert hat. Falls nicht, bleibt die Abluft fuer 30 Minuten gesperrt und versucht es danach erneut.
      - type: grid
        cards:
          - type: markdown
            content: |
              **Status:** {% if state_attr('sensor.grow_arbiter_v4', 'vent_cooldown_active') %}Abluft ist voruebergehend gesperrt.{% elif state_attr('sensor.grow_arbiter_v4', 'vent_probe_active') %}Abluft wird gerade auf Wirkung geprueft.{% else %}Keine Sperre und keine aktive Wirkungspruefung.{% endif %}

              **Regelgrund:** {{ state_attr('sensor.grow_arbiter_v4', 'vent_reason') | default('idle', true) }}

              **Pruefgrund:** {% set reason = state_attr('sensor.grow_arbiter_v4', 'vent_probe_reason') | default('idle', true) %}{% if reason in ['idle', 'unknown', 'unavailable', 'cooldown'] %}kein aktiver Pruefgrund{% else %}{{ reason }}{% endif %}

              **Naechster Retry:** {% if state_attr('sensor.grow_arbiter_v4', 'vent_cooldown_active') %}{{ states('input_datetime.grow_vent_retry_at') }}{% else %}keine Sperre aktiv{% endif %}

              **Pruefung gestartet:** {% if state_attr('sensor.grow_arbiter_v4', 'vent_probe_active') %}{{ states('input_datetime.grow_vent_probe_started_at') }}{% else %}keine aktive Pruefung{% endif %}

              **Ausgangswerte:** {% if state_attr('sensor.grow_arbiter_v4', 'vent_probe_active') or state_attr('sensor.grow_arbiter_v4', 'vent_cooldown_active') %}{{ states('input_number.grow_vent_probe_baseline_temp') }} °C / {{ states('input_number.grow_vent_probe_baseline_humidity') }} %{% else %}keine relevanten Vergleichswerte aktiv{% endif %}
      - type: grid
        columns: 3
        cards:
          - type: tile
            entity: sensor.grow_arbiter_v4
            name: Regelgrund
            icon: mdi:information-outline
            state_content:
              - attribute: vent_reason
          - type: tile
            entity: sensor.grow_arbiter_v4
            name: Abluft gesperrt
            icon: mdi:fan-alert
            state_content:
              - attribute: vent_cooldown_active
          - type: tile
            entity: sensor.grow_arbiter_v4
            name: 5-Min-Pruefung
            icon: mdi:progress-clock
            state_content:
              - attribute: vent_probe_active
          - type: tile
            entity: sensor.grow_arbiter_v4
            name: Pruefgrund
            icon: mdi:clipboard-pulse
            state_content:
              - attribute: vent_probe_reason

  # Compares active setpoints and live values, plus a concise all-phase reference.
  - title: Phasen
    path: phases
    icon: mdi:sprout
    type: sections
    sections:
      - type: grid
        cards:
          - type: markdown
            content: |
              # Phasensteuerung
              Aktive Phase: **{{ states('sensor.grow_policy_registry_v4') }}**. Die Registerwerte sind hier sichtbar, aber bewusst nicht auf diesem Dashboard veraenderbar.
      - type: grid
        columns: 3
        cards:
          - type: tile
            entity: sensor.grow_policy_registry_v4
            name: Aktive Phase
            icon: mdi:sprout
          - type: tile
            entity: sensor.grow_v4_min_temperature_mirror
            name: Min Temperatur
            icon: mdi:thermometer-low
          - type: tile
            entity: sensor.grow_v4_max_temperature_mirror
            name: Max Temperatur
            icon: mdi:thermometer-high
      - type: grid
        cards:
          - type: markdown
            content: |
              ## Sollbereich der aktiven Phase
              Die Grenzwerte kommen ausschliesslich aus dem aktiven Register und bleiben hier bewusst read-only.
      - type: grid
        columns: 2
        cards:
          - type: tile
            entity: sensor.grow_v4_min_humidity_mirror
            name: Min Luftfeuchte
            icon: mdi:water-minus
          - type: tile
            entity: sensor.grow_v4_max_humidity_mirror
            name: Max Luftfeuchte
            icon: mdi:water-plus
          - type: tile
            entity: sensor.grow_v4_min_soil_mirror
            name: Min Boden
            icon: mdi:water-percent-alert
          - type: tile
            entity: sensor.grow_v4_max_soil_mirror
            name: Max Boden
            icon: mdi:water-percent
      - type: grid
        cards:
          - type: markdown
            content: |
              ## Ist-Zustand jetzt
              Die folgenden Werte zeigen den aktuellen Messzustand des Schranks im direkten Vergleich zum aktiven Sollbereich.
      - type: grid
        columns: 2
        cards:
          - type: gauge
            entity: sensor.grow_v4_temperature_mirror
            name: Temperatur
            min: 10
            max: 40
            needle: true
          - type: gauge
            entity: sensor.grow_v4_humidity_mirror
            name: Luftfeuchtigkeit
            min: 0
            max: 100
            needle: true
          - type: gauge
            entity: sensor.grow_v4_soil_1_mirror
            name: Boden Pflanze 1
            min: 0
            max: 100
            needle: true
          - type: gauge
            entity: sensor.grow_v4_soil_2_mirror
            name: Boden Pflanze 2
            min: 0
            max: 100
            needle: true
      - type: grid
        columns: 2
        cards:
          - type: tile
            entity: sensor.grow_v4_tank_mirror
            name: Wassertank
            icon: mdi:water
          - type: tile
            entity: sensor.grow_v4_light_command_mirror
            name: Lichtphase aktiv
            icon: mdi:lightbulb-clock
      - type: grid
        cards:
          - type: markdown
            content: |
              ## Phasenvergleich
              Kompakte Orientierung ueber alle festen Registerphasen von Grow OS HA.

              | Phase | Temperatur | Luftfeuchte | Boden | Licht |
              |---|---:|---:|---:|---:|
              | Wachstum | 18-22 C | 50-70 % | 50-75 % | 15 h |
              | Vorbluete | 16-20 C | 50-55 % | 50-75 % | 12 h |
              | Bluete | 18-20 C | 40-50 % | 55-80 % | 12 h |
              | Nachbluete | 16-20 C | 30-40 % | 45-70 % | 10 h |
              | Ruhe | 16-18 C | 30-40 % | 30-50 % | 0 h |
      - type: grid
        cards:
          - type: history-graph
            title: Bodenfeuchte der letzten 24 Stunden
            hours_to_show: 24
            entities:
              - sensor.grow_v4_soil_1_mirror
              - sensor.grow_v4_soil_2_mirror

  # Mapping is intentionally separate from daily operation and has an explicit commit.
  - title: Geraete
    path: devices
    icon: mdi:devices
    type: sections
    sections:
      - type: grid
        cards:
          - type: markdown
            content: |
              # Geraete und Sensoren zuordnen
              1. Auswahl oeffnen und durch Tippen filtern. 2. Gewuenschte Entitaet auswaehlen. 3. Erst **Zuordnung uebernehmen** schreibt alles in die Registry-JSON und aktiviert die Aenderung.
      - type: grid
        cards:
          - type: markdown
            content: |
              ## Aktoren
              Diese Auswahl legt fest, welche physischen Schalter die Arbiter-Befehle spiegeln.
      - type: grid
        columns: 2
        cards:
          - type: entities
            title: Licht und Klima
            entities:
              - input_select.grow_light_device_select
              - input_select.grow_heat_device_select
              - input_select.grow_vent_device_select
          - type: entities
            title: Bewaesserung
            entities:
              - input_select.grow_pump1_device_select
              - input_select.grow_pump2_device_select
      - type: grid
        cards:
          - type: markdown
            content: |
              ## Messquellen
              Nur verfuegbare Sensoren werden angeboten. Die Auswahl aendert zunaechst nichts an der laufenden Regelung.
      - type: grid
        columns: 2
        cards:
          - type: entities
            title: Klima
            entities:
              - input_select.grow_temperature_sensor_select
              - input_select.grow_humidity_sensor_select
          - type: entities
            title: Wasser und Substrat
            entities:
              - input_select.grow_soil1_sensor_select
              - input_select.grow_soil2_sensor_select
              - input_select.grow_tank_sensor_select
      - type: grid
        cards:
          - type: markdown
            content: |
              ## Pflanzenprofile
              Die Profile beeinflussen nur den Plant Buddy. Der Arbiter behaelt seine festen Register und laesst sich dadurch nicht ueberschreiben.
      - type: grid
        columns: 2
        cards:
          - type: entities
            title: Profile waehlen
            entities:
              - input_select.grow_plant1_profile_select
              - input_select.grow_plant2_profile_select
          - type: entities
            title: Aktiv bestaetigt
            entities:
              - input_text.grow_confirmed_plant1_profile
              - input_text.grow_confirmed_plant2_profile
      - type: grid
        cards:
          - type: markdown
            content: |
              ## Aenderung verbindlich machen
              Pruefe die Auswahl oben. Geraete und Sensoren werden mit dem linken Button gespeichert. Pflanzenprofile werden mit dem rechten Button bestaetigt und nur fuer Empfehlungen uebernommen.
      - type: grid
        columns: 2
        cards:
          - type: tile
