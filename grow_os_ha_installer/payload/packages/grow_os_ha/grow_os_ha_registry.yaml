###############################################################################
# GROW OS HA v4.1 - REGISTERS AND MIRRORS
# Single policy source for the Arbiter. Values are read-only policy registers;
# actuators and UI mirrors consume them but never alter them.
###############################################################################

template:
  - sensor:
      # Raw physical measurements normalized for the Arbiter input layer.
      - name: Grow Temperature Fused
        unique_id: grow_temperature_fused
        device_class: temperature
        unit_of_measurement: "°C"
        state: "{{ states(state_attr('sensor.grow_device_registry', 'temperature')) | float(none) }}"

      - name: Grow Humidity Fused
        unique_id: grow_humidity_fused
        device_class: humidity
        unit_of_measurement: "%"
        state: "{{ states(state_attr('sensor.grow_device_registry', 'humidity')) | float(none) }}"

      - name: Grow Auto Phase
        unique_id: grow_auto_phase
        icon: mdi:timeline-clock
        state: >
          {% set start = state_attr('input_datetime.grow_cycle_start', 'timestamp') | float(0) %}
          {% set days = ((now().timestamp() - start) / 86400) | int(0) %}
          {% if days < 14 %}Wachstum
          {% elif days < 42 %}Wachstum
          {% elif days < 52 %}VorblÃ¼te
          {% elif days < 101 %}BlÃ¼te
          {% elif days < 115 %}NachblÃ¼te
          {% else %}Ruhe
            {% endif %}

      # Device IDs selected in the dashboard; actuator mirrors consume these.
      - name: Grow Device Registry
        unique_id: grow_device_registry
        icon: mdi:devices
        state: ready
        attributes:
          light: "{{ states('input_text.grow_confirmed_light') }}"
          heat: "{{ states('input_text.grow_confirmed_heat') }}"
          vent: "{{ states('input_text.grow_confirmed_vent') }}"
          pump1: "{{ states('input_text.grow_confirmed_pump1') }}"
          pump2: "{{ states('input_text.grow_confirmed_pump2') }}"
          temperature: "{{ states('input_text.grow_confirmed_temperature') }}"
          humidity: "{{ states('input_text.grow_confirmed_humidity') }}"
          soil1: "{{ states('input_text.grow_confirmed_soil1') }}"
          soil2: "{{ states('input_text.grow_confirmed_soil2') }}"
          tank: "{{ states('input_text.grow_confirmed_tank') }}"
          plant1_profile: "{{ states('input_text.grow_confirmed_plant1_profile') }}"
          plant2_profile: "{{ states('input_text.grow_confirmed_plant2_profile') }}"

      # Fixed, read-only policy ranges.  Only the Arbiter evaluates them.
      - name: Grow Policy Registry v4
        unique_id: grow_policy_registry_v4
        icon: mdi:book-cog
        state: "{{ states('sensor.grow_auto_phase') }}"
        attributes:
          phase_key: >
            {{ {'Wachstum':'wachstum','VorblÃ¼te':'vorbluete','BlÃ¼te':'bluete','NachblÃ¼te':'nachbluete','Ruhe':'ruhe'}.get(states('sensor.grow_auto_phase'), 'wachstum') }}
          min_temp: >
            {{ {'Wachstum':18,'VorblÃ¼te':16,'BlÃ¼te':18,'NachblÃ¼te':16,'Ruhe':16}.get(states('sensor.grow_auto_phase'),18) }}
          max_temp: >
            {{ {'Wachstum':22,'VorblÃ¼te':20,'BlÃ¼te':20,'NachblÃ¼te':20,'Ruhe':18}.get(states('sensor.grow_auto_phase'),22) }}
          min_humidity: >
            {{ {'Wachstum':50,'VorblÃ¼te':50,'BlÃ¼te':40,'NachblÃ¼te':30,'Ruhe':30}.get(states('sensor.grow_auto_phase'),50) }}
          max_humidity: >
            {{ {'Wachstum':70,'VorblÃ¼te':55,'BlÃ¼te':50,'NachblÃ¼te':40,'Ruhe':40}.get(states('sensor.grow_auto_phase'),70) }}
          min_soil: >
            {{ {'Wachstum':50,'VorblÃ¼te':50,'BlÃ¼te':55,'NachblÃ¼te':45,'Ruhe':30}.get(states('sensor.grow_auto_phase'),50) }}
          max_soil: >
            {{ {'Wachstum':75,'VorblÃ¼te':75,'BlÃ¼te':80,'NachblÃ¼te':70,'Ruhe':50}.get(states('sensor.grow_auto_phase'),75) }}
          light_hours: >
            {{ {'Wachstum':15,'VorblÃ¼te':12,'BlÃ¼te':12,'NachblÃ¼te':10,'Ruhe':0}.get(states('sensor.grow_auto_phase'),15) }}
          tank_minimum: 5


