###############################################################################
# GROW v4.0 — DEVICE MAPPING MIRROR
# The dashboard chooses devices. This package only persists the selection and
# refreshes the registry; it never makes an environmental control decision.
###############################################################################

shell_command:
  grow_v4_registry_write: >-
    python3 /config/packages/grow/grow_registry_writer.py {{ role }} {{ entity_id }}
  grow_v4_profile_write: >-
    python3 /config/packages/grow/grow_plant_profile_writer.py {{ role }} {{ profile_name }}

automation:
  # Populates selectable physical entities without affecting control policy.
  - alias: Grow v4 Populate Device Dropdowns
    mode: single
    trigger:
      - platform: homeassistant
        event: start
    action:
      - service: input_select.set_options
        target:
          entity_id: input_select.grow_light_device_select
        data:
          options: "{{ (states.light | map(attribute='entity_id') | list + states.switch | map(attribute='entity_id') | list) | sort }}"
      - service: input_select.set_options
        target:
          entity_id:
            - input_select.grow_heat_device_select
            - input_select.grow_vent_device_select
            - input_select.grow_pump1_device_select
            - input_select.grow_pump2_device_select
        data:
          options: "{{ states.switch | map(attribute='entity_id') | list | sort }}"
      - service: input_select.set_options
        target:
          entity_id:
            - input_select.grow_temperature_sensor_select
            - input_select.grow_humidity_sensor_select
            - input_select.grow_soil1_sensor_select
            - input_select.grow_soil2_sensor_select
            - input_select.grow_tank_sensor_select
        data:
          options: >
            {% set excluded = [
              'sensor.grow_arbiter_v4',
              'sensor.grow_device_registry',
              'sensor.grow_policy_registry_v4',
              'sensor.grow_temperature_fused',
              'sensor.grow_humidity_fused',
              'sensor.grow_v4_temperature_mirror',
              'sensor.grow_v4_humidity_mirror',
              'sensor.grow_v4_soil_1_mirror',
              'sensor.grow_v4_soil_2_mirror',
              'sensor.grow_v4_tank_mirror',
              'sensor.grow_v4_total_power_mirror',
              'sensor.grow_v4_total_energy_mirror',
              'sensor.grow_v4_energy_cost_mirror',
              'sensor.grow_plant_1_stress',
              'sensor.grow_plant_2_stress',
              'sensor.grow_plant_buddy',
              'sensor.grow_plant_buddy_climate_review',
              'sensor.grow_plant_1_soil_review',
              'sensor.grow_plant_2_soil_review',
              'sensor.grow_plant_profile_registry',
              'sensor.grow_buddy_temperature_hour_mean_raw',
              'sensor.grow_buddy_temperature_hour_change_raw',
              'sensor.grow_buddy_humidity_hour_mean_raw',
              'sensor.grow_buddy_humidity_hour_change_raw',
              'sensor.grow_buddy_light_on_ratio_hour',
              'sensor.grow_buddy_soil_1_six_hour_mean',
              'sensor.grow_buddy_soil_1_six_hour_change',
              'sensor.grow_buddy_soil_2_six_hour_mean',
              'sensor.grow_buddy_soil_2_six_hour_change'
            ] %}
            {{ states.sensor
               | rejectattr('state', 'in', ['unknown', 'unavailable'])
               | rejectattr('entity_id', 'in', excluded)
               | map(attribute='entity_id') | list | sort }}

  - alias: Grow v4 Confirm Device Mapping
    # This action runs only after the operator explicitly confirms a selection.
    # It is persistence only; it never issues a physical actuator command.
    mode: queued
    trigger:
      - platform: state
        entity_id: input_button.grow_confirm_device_mapping
    action:
      - repeat:
          for_each:
            - { role: light, select: input_select.grow_light_device_select, confirmed: input_text.grow_confirmed_light }
            - { role: heat, select: input_select.grow_heat_device_select, confirmed: input_text.grow_confirmed_heat }
            - { role: vent, select: input_select.grow_vent_device_select, confirmed: input_text.grow_confirmed_vent }
            - { role: pump1, select: input_select.grow_pump1_device_select, confirmed: input_text.grow_confirmed_pump1 }
            - { role: pump2, select: input_select.grow_pump2_device_select, confirmed: input_text.grow_confirmed_pump2 }
            - { role: temperature, select: input_select.grow_temperature_sensor_select, confirmed: input_text.grow_confirmed_temperature }
            - { role: humidity, select: input_select.grow_humidity_sensor_select, confirmed: input_text.grow_confirmed_humidity }
            - { role: soil1, select: input_select.grow_soil1_sensor_select, confirmed: input_text.grow_confirmed_soil1 }
            - { role: soil2, select: input_select.grow_soil2_sensor_select, confirmed: input_text.grow_confirmed_soil2 }
            - { role: tank, select: input_select.grow_tank_sensor_select, confirmed: input_text.grow_confirmed_tank }
          sequence:
            - service: shell_command.grow_v4_registry_write
              data:
                role: "{{ repeat.item.role }}"
                entity_id: "{{ states(repeat.item.select) }}"
            - service: input_text.set_value
              target:
                entity_id: "{{ repeat.item.confirmed }}"
              data:
                value: "{{ states(repeat.item.select) }}"
      - service: homeassistant.update_entity
        target:
          entity_id:
            - sensor.grow_device_registry
            - sensor.grow_arbiter_v4

  - alias: Grow v4 Confirm Plant Profiles
    # Plant type confirmations are persisted explicitly and remain advisory.
    # They feed Plant Buddy recommendations only and never override policy.
    mode: queued
    trigger:
      - platform: state
        entity_id: input_button.grow_confirm_plant_profiles
    action:
      - repeat:
          for_each:
            - { role: plant1_profile, select: input_select.grow_plant1_profile_select, confirmed: input_text.grow_confirmed_plant1_profile }
            - { role: plant2_profile, select: input_select.grow_plant2_profile_select, confirmed: input_text.grow_confirmed_plant2_profile }
          sequence:
            - service: shell_command.grow_v4_profile_write
              data:
                role: "{{ repeat.item.role }}"
                profile_name: "{{ states(repeat.item.select) }}"
            - service: input_text.set_value
              target:
                entity_id: "{{ repeat.item.confirmed }}"
              data:
                value: "{{ states(repeat.item.select) }}"
      - service: homeassistant.update_entity
        target:
          entity_id:
            - sensor.grow_device_registry
            - sensor.grow_plant_profile_registry
            - sensor.grow_plant_buddy
            - sensor.grow_plant_1_stress
            - sensor.grow_plant_2_stress
