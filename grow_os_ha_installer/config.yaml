name: Grow OS HA v4 Installer
version: 4.0.0
slug: grow_os_ha_installer
description: Installiert Grow OS HA v4.0 Dateien nach /config fuer Home Assistant OS.
url: https://github.com/CorCorMS/grow-os-ha
startup: once
boot: manual
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
map:
  - type: homeassistant_config
    read_only: false
options:
  overwrite_existing: true
  create_backup: true
  install_example_esphome: true
schema:
  overwrite_existing: bool
  create_backup: bool
  install_example_esphome: bool

