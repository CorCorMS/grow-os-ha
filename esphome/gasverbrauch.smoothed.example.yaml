# HOUSE v4.0 — Gasverbrauch mit bestehender Impulslogik, aber ruhigerem Durchfluss.
# Ziel:
# - bestehendes Zählerprinzip beibehalten
# - Live-Impuls unverändert als Roh-Diagnosesignal beibehalten
# - einen rohen und einen geglätteten Durchflusssensor bereitstellen
# - keine Umstellung auf pulse_meter

esphome:
  name: gaszahler
  friendly_name: Gaszähler

  on_boot:
    priority: -100
    then:
      - lambda: |-
          int initial = 1722897;

          if (id(total_pulses) < initial) {
            ESP_LOGI("setup", "Zählerstand (%d) < Initialwert (%d) -> Initialwert wird übernommen.", id(total_pulses), initial);
            id(total_pulses) = initial;
          } else {
            ESP_LOGI("setup", "Zählerstand (%d) >= Initialwert (%d) -> nichts geändert.", id(total_pulses), initial);
          }

esp8266:
  board: esp01_1m

preferences:
  flash_write_interval: 1min

logger:

api:
  encryption:
    key: "REPLACE_WITH_YOUR_API_KEY"

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: Gasverbrauch Fallback Hotspot
    password: "REPLACE_WITH_FALLBACK_PASSWORD"

captive_portal:

globals:
  # Gesamtanzahl der Impulse.
  - id: total_pulses
    type: int
    restore_value: true
    initial_value: '1722897'

  # 1 Impuls = 0.01 m³
  - id: imp_ratio
    type: float
    restore_value: true
    initial_value: '0.01'

binary_sensor:
  - platform: gpio
    id: gasverbrauch_internal_pulse_counter
    pin:
      number: GPIO5
      mode: INPUT_PULLUP
    name: "Live-Impuls"

    filters:
      - delayed_on: 50ms

    on_press:
      then:
        - lambda: |-
            id(total_pulses) += 1;

sensor:
  ###########################################################################
  # Impulszähler
  ###########################################################################

  - platform: template
    id: gaszaehler_pulse
    name: "Gaszähler Impulse"
    state_class: total_increasing
    accuracy_decimals: 0
    lambda: |-
      return id(total_pulses);

  ###########################################################################
  # Gaszählerstand (entspricht dem mechanischen Zähler)
  ###########################################################################

  - platform: template
    id: gaszaehler_stand
    name: "Gaszählerstand"
    device_class: gas
    unit_of_measurement: "m³"
    state_class: total_increasing
    icon: mdi:meter-gas
    accuracy_decimals: 2
    lambda: |-
      return id(total_pulses) * id(imp_ratio);

  ###########################################################################
  # Gesamtverbrauch m³
  ###########################################################################

  - platform: template
    id: gasverbrauch_m3
    name: "Gasverbrauch (m³)"
    device_class: gas
    unit_of_measurement: "m³"
    state_class: total_increasing
    icon: mdi:fire
    accuracy_decimals: 2
    lambda: |-
      return id(total_pulses) * id(imp_ratio);

  ###########################################################################
  # Gesamtverbrauch kWh
  # Umrechnung: 1 m³ = 11.681 kWh
  ###########################################################################

  - platform: template
    id: gasverbrauch_kwh
    name: "Gasverbrauch (kWh)"
    device_class: energy
    unit_of_measurement: "kWh"
    state_class: total_increasing
    icon: mdi:fire
    accuracy_decimals: 2
    lambda: |-
      return id(total_pulses) * id(imp_ratio) * 11.681;

  ###########################################################################
  # Roh-Durchfluss
  # Messfenster: 15 Sekunden
  # Vorteil: reagiert schneller als das alte 60s-Fenster, bleibt aber nah an
  # deiner bisherigen Logik.
  ###########################################################################

  - platform: template
    id: gas_durchfluss_m3h_raw
    name: "Gas Durchfluss Roh"
    unit_of_measurement: "m³/h"
    icon: mdi:gauge
    accuracy_decimals: 3
    update_interval: 15s
    lambda: |-
      static int last_pulses = 0;
      static bool initialized = false;

      int current_pulses = id(total_pulses);

      if (!initialized) {
        last_pulses = current_pulses;
        initialized = true;
        return 0.0;
      }

      int diff = current_pulses - last_pulses;
      last_pulses = current_pulses;

      if (diff <= 0) {
        return 0.0;
      }

      // 1 Impuls = 0.01 m³
      // Messfenster = 15 Sekunden
      // Umrechnung auf m³/h => * 3600 / 15 = * 240
      return diff * id(imp_ratio) * 240.0;

  ###########################################################################
  # Geglätteter Durchfluss
  # Nutzt den Rohwert und glättet ihn für Home Assistant deutlich angenehmer.
  ###########################################################################

  - platform: copy
    source_id: gas_durchfluss_m3h_raw
    id: gas_durchfluss_m3h
    name: "Gas Durchfluss"
    filters:
      - sliding_window_moving_average:
          window_size: 4
          send_every: 1
      - round: 3
