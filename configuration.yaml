# GROW OS HA v4.1 - Home Assistant entry point.
# Packages contain the single-source Arbiter architecture; only the v4.1
# Energy-style dashboard is exposed in the sidebar.
homeassistant:
  packages: !include_dir_named packages/grow_os_ha

# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

script: !include scripts.yaml
scene: !include scenes.yaml

# Tailscale funnel
http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 127.0.0.1

lovelace:
  dashboards:
    grow-os-ha:
      mode: yaml
      title: Grow OS HA
      icon: mdi:cog-box
      show_in_sidebar: true
      filename: lovelace/grow_os_ha_dashboard.yaml
